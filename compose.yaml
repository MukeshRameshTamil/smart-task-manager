services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-task-postgres
    environment:
      POSTGRES_DB: smart_tasks
      POSTGRES_USER: smart_user
      POSTGRES_PASSWORD: smart_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_user -d smart_tasks"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

