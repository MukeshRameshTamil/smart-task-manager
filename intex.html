<!DOCTYPE html>
<html>
<head>
    <title>Smart Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<div class="app">
    <h1>✨ Smart Task Manager</h1>

    <div class="input-box">
        <input type="text" id="taskName" placeholder="Enter task...">
        <input type="number" id="days" placeholder="Days left">

        <select id="priority">
            <option value="1">🔥 High</option>
            <option value="2">⚡ Medium</option>
            <option value="3">🌿 Low</option>
        </select>

        <button onclick="addTask()">➕ Add</button>
        <button onclick="suggestTask()">🤖 Suggest</button>
    </div>

    <div class="filters">
        <button onclick="filterTasks('all')">All</button>
        <button onclick="filterTasks('pending')">Pending</button>
        <button onclick="filterTasks('completed')">Done</button>
    </div>

    <div id="taskContainer"></div>

    <h2 id="result"></h2>
</div>

<script src="script.js"></script>
</body>
</html>
