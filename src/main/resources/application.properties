spring.application.name=smart-task-manager

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/smart_tasks}
spring.datasource.username=${DATABASE_USERNAME:smart_user}
spring.datasource.password=${DATABASE_PASSWORD:smart_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

app.seed-demo-data=${SEED_DEMO_DATA:true}

